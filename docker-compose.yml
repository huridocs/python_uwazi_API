services:
  uwazi-agent:
    build: .
    network_mode: host
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-deepseek/deepseek-v4-flash}
      - GRAYLOG_HOST=${GRAYLOG_HOST:-}
      - GRAYLOG_PORT=${GRAYLOG_PORT:-12201}
    restart: unless-stopped
