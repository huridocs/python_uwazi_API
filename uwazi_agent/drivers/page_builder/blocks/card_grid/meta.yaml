name: card_grid
description: Grid of cards with title, description, and optional icon/link
when_to_use: Feature lists, service offerings, team members, resource links

required_slots:
  cards:
    type: list
    description: List of card entries
    item_schema:
      title:
        type: string
        description: Card title
      description:
        type: string
        description: Card description text
      icon:
        type: string
        description: Optional emoji or icon character
        default: ""
      link:
        type: string
        description: Optional URL link
        default: ""

optional_slots:
  heading:
    type: string
    description: Section heading
    default: ""
  columns:
    type: integer
    description: Number of columns (1, 2, 3, or 4)
    default: 3
    enum: [1, 2, 3, 4]
